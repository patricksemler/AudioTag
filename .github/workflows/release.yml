name: Release

# Build installers for macOS + Windows on every push to main and publish them
# to a rolling "latest" pre-release so anyone can grab a fresh build.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: true

jobs:
  # Clear out the previous rolling release + tag so each run publishes a clean
  # set of installers instead of piling assets onto an old release.
  prepare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Remove previous "latest" release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release delete latest --yes --cleanup-tag --repo "$GITHUB_REPOSITORY" || true

  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
            args: --target universal-apple-darwin
          - os: windows-latest
            rust-targets: ""
            args: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: pnpm install --frozen-lockfile
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: latest
          releaseName: AudioTag — latest build
          releaseBody: |
            Automated build from the latest commit on `main`.
            Download the installer for your platform below. These are unsigned
            development builds; your OS may warn before opening them.
          prerelease: true
          args: ${{ matrix.args }}
