name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  changelog:
    name: Changelog updated
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Require a CHANGELOG entry for source changes
        env:
          BASE: ${{ github.event.pull_request.base.sha }}
          HEAD: ${{ github.event.pull_request.head.sha }}
          TITLE: ${{ github.event.pull_request.title }}
        run: |
          if printf '%s' "$TITLE" | grep -qiF '[skip changelog]'; then
            echo "PR title opts out via [skip changelog] — skipping check."
            exit 0
          fi
          changed=$(git diff --name-only "$BASE" "$HEAD")
          echo "Changed files:"; echo "$changed"
          if printf '%s\n' "$changed" | grep -qE '^(src/|src-tauri/src/)'; then
            if printf '%s\n' "$changed" | grep -qx 'CHANGELOG.md'; then
              echo "CHANGELOG.md was updated."
            else
              echo "::error::App source changed but CHANGELOG.md was not updated. Add an entry under [Unreleased], or put [skip changelog] in the PR title for non-user-facing changes."
              exit 1
            fi
          else
            echo "No app source changes; CHANGELOG update not required."
          fi

  frontend:
    name: Frontend (lint, typecheck, build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

  rust:
    name: Rust (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      # The Tauri build embeds the frontend at compile time, so build it first.
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Format check
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --check
      - name: Clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings
      - name: Test
        run: cargo test --manifest-path src-tauri/Cargo.toml
      - name: Build
        run: cargo build --manifest-path src-tauri/Cargo.toml
